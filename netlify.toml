[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Same-origin reverse proxy — browser Network tab shows jointavrion.com/api/sb/*, not *.supabase.co
[[redirects]]
  from = "/api/sb/*"
  to = "https://jilehijfjayayfumbrsl.supabase.co/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/sb"
  to = "https://jilehijfjayayfumbrsl.supabase.co/"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "text/xml; charset=utf-8"

[[headers]]
  for = "/api/sb/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
