# Zero-config Supabase keepalive — uses public anon endpoints (no repo secrets required).

name: Supabase keepalive

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase (auth + REST)
        run: |
          set -euo pipefail
          BASE="https://jilehijfjayayfumbrsl.supabase.co"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppbGVoaWpmamF5YXlmdW1icnNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzQ1ODQsImV4cCI6MjA5Nzk1MDU4NH0.UFzU1lXpguU3NoW8zKqsfYUVMdIgxOrSbofWV7OmmQw"

          AUTH_CODE=$(curl -s -o /tmp/auth-health.json -w "%{http_code}" \
            "${BASE}/auth/v1/health" -H "apikey: ${KEY}")

          REST_CODE=$(curl -s -o /tmp/rest-orgs.json -w "%{http_code}" \
            "${BASE}/rest/v1/organizations?select=id&limit=1" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}")

          echo "Auth health HTTP ${AUTH_CODE}"
          echo "REST organizations HTTP ${REST_CODE}"

          if [ "$AUTH_CODE" != "200" ] && [ "$REST_CODE" != "200" ]; then
            echo "::error::Keepalive failed — auth=${AUTH_CODE}, rest=${REST_CODE}"
            exit 1
          fi

          echo "Supabase keepalive OK at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
